services:
  # 1. Baza danych PostgreSQL
  db:
    image: postgres:16-alpine
    container_name: recipe_hq_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: czarny123
      POSTGRES_DB: recipe_hq
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # 2. LocalStack (S3)
  localstack:
    image: localstack/localstack:latest
    container_name: recipe_hq_aws
    ports:
      - "4566:4566"
    environment:
      - SERVICES=s3
      - PERSISTENCE=1
      - DEFAULT_REGION=us-east-1
      - ENFORCE_IAM=0                   # WYŁĄCZA zabezpieczenia (ważne!)
      - S3_SKIP_SIGNATURE_VALIDATION=1   # POZWALA na proste linki (ważne!)
    volumes:
      - "./localstack_data:/var/lib/localstack"
      - "./localstack_init:/etc/localstack/init/ready.d"
      - "/var/run/docker.sock:/var/run/docker.sock"

  # 3. Aplikacja FastAPI
  app:
    build: .
    container_name: recipe_hq_app
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    env_file:
      - .env
    depends_on:
      - db
      - localstack

  # 4. Frontend Next.js
  frontend:
    build: ./frontend
    container_name: recipe_hq_frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000/api/v1
    depends_on:
      - app

volumes:
  postgres_data: