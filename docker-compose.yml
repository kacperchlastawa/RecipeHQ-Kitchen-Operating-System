version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: recipe_hq_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: recipe_hq
    ports:
      - "5433:5432"  # Mapowanie: HOST:KONTENER
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: