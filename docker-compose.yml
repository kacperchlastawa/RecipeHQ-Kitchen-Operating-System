version: '3.8'

services:
  # 1. Baza danych PostgreSQL
  db:
    image: postgres:16-alpine
    container_name: recipe_hq_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: czarny123
      POSTGRES_DB: recipe_hq
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  localstack:
    image: localstack/localstack:latest
    container_name: recipe_hq_aws
    ports:
      - "4566:4566"
    environment:
      - SERVICES=s3
      - DEFAULT_REGION=us-east-1
      - DEBUG=1
      - DOCKER_HOST=unix:///var/run/docker.sock
    volumes:
      - "./localstack_data:/var/lib/localstack"
      - "/var/run/docker.sock:/var/run/docker.sock"
  # 3. Twoja aplikacja FastAPI
  app:
    build: .
    container_name: recipe_hq_app
    ports:
      - "8000:8000"
    volumes:
      - .:/app                 # Montowanie kodu na żywo (hot-reload)
    env_file:
      - .env                   # Wczytywanie haseł i kluczy z pliku
    depends_on:
      - db
      - localstack

volumes:
  postgres_data: